<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MayaMind</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Dashboard Grid -->
  <div id="dashboard" class="dashboard">
    <div class="dashboard-header">
      <h1>MayaMind</h1>
      <p class="subtitle">Your wellness companion</p>
      <button class="settings-gear-btn" id="dashboard-gear" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="dashboard-grid">
      <!-- Maya Conversation Block -->
      <div class="dashboard-block" data-section="maya">
        <div class="block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="5"/>
            <path d="M3 21v-2a7 7 0 0 1 7-7h4a7 7 0 0 1 7 7v2"/>
          </svg>
        </div>
        <div class="block-label">Maya</div>
        <div class="block-description">Conversation</div>
        <div class="block-status" id="maya-status"></div>
      </div>

      <!-- Exercise Guidance Block -->
      <div class="dashboard-block" data-section="exercise">
        <div class="block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6.5 6.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
            <path d="M2 21v-2a3 3 0 0 1 3-3h3"/>
            <path d="M14 8h8M14 12h8M14 16h8"/>
          </svg>
        </div>
        <div class="block-label">Exercise</div>
        <div class="block-description">Guidance</div>
        <div class="block-status" id="exercise-status"></div>
      </div>

      <!-- Health Monitoring Block -->
      <div class="dashboard-block" data-section="health">
        <div class="block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="block-label">Health</div>
        <div class="block-description">Monitoring</div>
        <div class="block-status" id="health-status"></div>
      </div>

      <!-- Connect with Loved Ones Block -->
      <div class="dashboard-block" data-section="connect">
        <div class="block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="block-label">Connect</div>
        <div class="block-description">Loved Ones</div>
        <div class="block-status" id="connect-status"></div>
      </div>
    </div>
  </div>

  <!-- Section Containers (hidden by default) -->
  <div id="section-container" class="section-container hidden">
    <!-- Dashboard Button (always visible in sections) -->
    <button id="dashboard-btn" class="dashboard-btn" title="Back to Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span class="dashboard-btn-label">Dashboard</span>
    </button>

    <!-- Mute Button (visible in sections alongside dashboard button) -->
    <button id="mute-btn" class="mute-btn" title="Mute/Unmute microphone">
      <span class="mute-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </span>
      <span class="mute-label">Mute</span>
    </button>

    <!-- Settings Button (visible in sections, rightmost) -->
    <button id="section-settings-btn" class="section-settings-btn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <!-- Maya Section -->
    <div id="maya-section" class="section hidden">
      <div class="section-header">
        <h2>Maya Conversation</h2>

        <div class="section-status" id="maya-section-status"></div>
      </div>
      <div id="maya-content" class="section-content">
        <!-- TalkingHead avatar will be mounted here -->
      </div>
    </div>

    <!-- Exercise Section -->
    <div id="exercise-section" class="section hidden">
      <div class="section-header">
        <h2>Exercise Guidance</h2>

        <div class="section-status" id="exercise-section-status"></div>
      </div>
      <div id="exercise-content" class="section-content">
        <!-- Exercise POC will be mounted here -->
      </div>
    </div>

    <!-- Health Monitoring Section -->
    <div id="health-section" class="section hidden">
      <div class="section-header">
        <h2>Health Monitoring</h2>

        <div class="section-status" id="health-section-status"></div>
      </div>
      <div id="health-content" class="section-content">
        <!-- HealthSection mounts here -->
      </div>
    </div>

    <!-- Connect Section -->
    <div id="connect-section" class="section hidden">
      <div class="section-header">
        <h2>Connect with Loved Ones</h2>

        <div class="section-status" id="connect-section-status"></div>
      </div>
      <div id="connect-content" class="section-content">
        <!-- ConnectSection will be mounted here -->
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="settings-form">
        <label>Name
          <input type="text" id="settings-name" placeholder="Your name" autocomplete="name">
        </label>
        <label>Phone
          <input type="tel" id="settings-phone" placeholder="Phone number" autocomplete="tel">
        </label>
        <label>Email
          <input type="email" id="settings-email" placeholder="Email address" autocomplete="email">
        </label>
        <label>Date of Birth
          <input type="date" id="settings-dob">
        </label>
        <label>Biological Sex
          <select id="settings-sex">
            <option value="">Select...</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>
        </label>
        <label>Street Address
          <input type="text" id="settings-street" placeholder="Street address" autocomplete="street-address">
        </label>
        <div class="settings-row">
          <label>City
            <input type="text" id="settings-city" placeholder="City" autocomplete="address-level2">
          </label>
          <label>State
            <select id="settings-state" autocomplete="address-level1">
              <option value="">Select...</option>
              <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option>
              <option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option>
              <option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option>
              <option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option>
              <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option>
              <option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option>
              <option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option>
              <option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option>
              <option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option>
              <option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option>
              <option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option>
              <option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option>
              <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option>
              <option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option>
              <option value="TX">TX</option><option value="UT">UT</option><option value="VT">VT</option>
              <option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option>
              <option value="WI">WI</option><option value="WY">WY</option><option value="DC">DC</option>
            </select>
          </label>
          <label>Zip Code
            <input type="text" id="settings-zip" placeholder="Zip" autocomplete="postal-code">
          </label>
        </div>
      </div>
      <div class="settings-actions">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p id="loading-text">Loading...</p>
  </div>

  <!-- Import map for TalkingHead dependencies (three, dompurify, marked).
       Versions must match what TalkingHead was built against. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "dompurify": "https://cdn.jsdelivr.net/npm/dompurify@3.1.7/+esm",
      "marked": "https://cdn.jsdelivr.net/npm/marked@14.1.3/+esm"
    }
  }
  </script>

  <!-- sql.js for personalization database -->
  <script src="lib/sql-wasm.js"></script>

  <!-- Scripts -->
  <script type="module" src="app.js"></script>
</body>
</html>
